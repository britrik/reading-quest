kind = "web"
previewPath = "/"
title = "Reading Quest"
version = "1.0.0"
id = "artifacts/reading-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23752

[services.development]
run = "pnpm --filter @workspace/reading-quest run dev"

[services.production]
serve = "static"
publicDir = "dist/public"

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/reading-quest run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.env]
PORT = "23752"
BASE_PATH = "/"
